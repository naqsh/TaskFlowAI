name: CI

on:
  push:
    branches:
      - epic/taskflow-implementation
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check backend

      - name: Ruff format check
        run: uv run ruff format --check backend

      - name: Mypy
        run: uv run mypy backend

      - name: Pytest
        run: uv run pytest

      - name: Validate AI-BOM
        run: uv run python scripts/validate_ai_bom.py

      - name: pip-audit (block critical/high CVEs)
        run: uv run python scripts/pip_audit_gate.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infrastructure/Dockerfile -t taskflow-ai:ci .

  workflow-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify task tracking docs exist
        run: |
          test -s docs/tasks/todo.md
          test -s docs/tasks/lessons.md
