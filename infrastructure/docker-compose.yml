services:
  app:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
